# SonarCloud configuration for Jellyfin Encoder Friend
# https://docs.sonarsource.com/sonarqube-cloud/advanced-setup/languages/python

# Project identification (matches SonarCloud project URL)
sonar.organization=loguefx
sonar.projectKey=loguefx_Jellyfin_Encoder_Friend

# Python version – enables precise analysis (fixes "Warnings in last analysis")
# Use the version you run and build with (e.g. 3.12)
sonar.python.version=3.12

# Sources to analyze
sonar.sources=.

# Exclude generated, build, and non-source paths
sonar.exclusions=\
  build/,\
  dist/,\
  **/__pycache__/,\
  **/*.pyc,\
  venv/,\
  env/,\
  .git/,\
  .cursor/,\
  **/lib/,\
  **/*.egg-info/,\
  **/exe.win-amd64*/

# Optional: exclude tests from duplication if you add tests later
# sonar.test.exclusions=**/test_*.py

# Encoding (default UTF-8)
sonar.sourceEncoding=UTF-8
