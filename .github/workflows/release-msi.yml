# Build MSI and publish to GitHub Releases when a version tag is pushed.
# - Tag push (e.g. v1.0.5): MSI is attached to that release.
# - Manual run (workflow_dispatch): MSI is attached as a draft release "Build from main" and as an artifact.

name: Build and Release MSI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-msi:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip and build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install cx_Freeze

      - name: Build MSI
        run: python setup.py bdist_msi

      - name: Verify MSI and prepare for upload
        id: msi
        run: |
          $msi = Get-ChildItem -Path dist -Filter "*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $msi) { Write-Error "No MSI file found in dist"; exit 1 }
          Write-Host "MSI: $($msi.FullName) ($($msi.Length) bytes)"
          Copy-Item -LiteralPath $msi.FullName -Destination "JellyfinAudioService-win64.msi"
          echo "msi_name=JellyfinAudioService-win64.msi" >> $env:GITHUB_OUTPUT

      # On tag push: attach MSI to the release for that tag
      - name: Upload MSI to Release (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: JellyfinAudioService-win64.msi
          draft: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # On manual run: create a draft release "Build from main" so the MSI appears under Releases
      - name: Create draft release and upload MSI (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-main-${{ github.run_id }}
          name: Build from main (${{ github.sha }})
          body: "MSI built from **main** (manual workflow run). Download the MSI from Assets below."
          files: JellyfinAudioService-win64.msi
          draft: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: JellyfinAudioService-MSI
          path: JellyfinAudioService-win64.msi
