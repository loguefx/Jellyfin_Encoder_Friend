# Build zip and MSI, publish to GitHub Releases on tag push.
# MSI installs files only; run "Register Jellyfin Service.bat" as admin after install to register the service.

name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install cx_Freeze

      - name: Build executable
        run: python setup.py build_exe

      - name: Create zip
        id: zip
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $exeDir = Get-ChildItem -Path build -Directory -Filter "exe.win-*" | Select-Object -First 1
          if (-not $exeDir) { Write-Error "No build\exe.win-* found"; exit 1 }
          $version = (Select-String -Path setup.py -Pattern 'version="([^"]+)"').Matches.Groups[1].Value
          if (-not $version) { $version = "1.0.0" }
          $zipName = "JellyfinAudioService-$version-win64.zip"
          Compress-Archive -Path "$($exeDir.FullName)\*" -DestinationPath "dist\$zipName" -Force
          echo "zip_name=$zipName" >> $env:GITHUB_OUTPUT
          echo "Created $zipName"

      - name: Build MSI
        run: python setup.py bdist_msi

      - name: Prepare release assets
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item -Path "dist\JellyfinAudioService-*-win64.zip" -Destination "release\" -Force
          $msi = Get-ChildItem -Path dist -Filter "*.msi" | Select-Object -First 1
          if (-not $msi) { Write-Error "No MSI found in dist\"; exit 1 }
          Copy-Item -LiteralPath $msi.FullName -Destination "release\JellyfinAudioService-win64.msi" -Force

      - name: Upload to Release (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create draft release (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-main-${{ github.run_id }}
          name: Build from main (${{ github.sha }})
          body: "Download the **zip** for install (extract, then run Register Jellyfin Service.bat as admin)."
          files: release/*
          draft: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: JellyfinAudioService-build
          path: release/
