# Build zip + Inno Setup exe installer, publish to GitHub Releases on tag push.
# cx_Freeze bdist_msi is NOT used: it generates Error 2762 on Windows 11 due to
# deferred custom actions scheduled before InstallInitialize in the execute sequence.

name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install cx_Freeze

      - name: Build executable
        run: python setup.py build_exe

      - name: Create zip
        id: zip
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $exeDir = Get-ChildItem -Path build -Directory -Filter "exe.win-*" | Select-Object -First 1
          if (-not $exeDir) { Write-Error "No build\exe.win-* found"; exit 1 }
          $version = (Select-String -Path setup.py -Pattern 'version="([^"]+)"').Matches.Groups[1].Value
          if (-not $version) { $version = "1.0.0" }
          $zipName = "JellyfinAudioService-$version-win64.zip"
          Compress-Archive -Path "$($exeDir.FullName)\*" -DestinationPath "dist\$zipName" -Force
          echo "zip_name=$zipName" >> $env:GITHUB_OUTPUT
          echo "Created $zipName"

      - name: Build Inno Setup installer
        run: |
          # Update version in .iss to match setup.py
          $version = (Select-String -Path setup.py -Pattern 'version="([^"]+)"').Matches.Groups[1].Value
          (Get-Content JellyfinAudioService.iss) -replace '#define AppVersion ".*"', "#define AppVersion `"$version`"" |
            Set-Content JellyfinAudioService.iss

          # Locate the Inno Setup compiler (pre-installed on windows-latest)
          $iscc = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) { choco install innosetup -y --no-progress; $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" }

          # Determine the build dir (Python version may vary on CI)
          $buildDir = (Get-ChildItem -Path build -Directory -Filter "exe.win-*" | Select-Object -First 1).Name
          & $iscc /DBuildDir="build\$buildDir" JellyfinAudioService.iss
          if ($LASTEXITCODE -ne 0) { Write-Error "Inno Setup failed"; exit 1 }

      - name: Prepare release assets
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item -Path "dist\JellyfinAudioService-*-win64.zip" -Destination "release\" -Force
          $setup = Get-ChildItem -Path dist -Filter "*-setup.exe" | Select-Object -First 1
          if (-not $setup) { Write-Error "No setup.exe found in dist\"; exit 1 }
          Copy-Item -LiteralPath $setup.FullName -Destination "release\JellyfinAudioService-win64-setup.exe" -Force

      - name: Upload to Release (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create draft release (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-main-${{ github.run_id }}
          name: Build from main (${{ github.sha }})
          body: "**JellyfinAudioService-win64-setup.exe** = recommended installer (registers service automatically)\n**JellyfinAudioService-*-win64.zip** = manual install (extract, then run Register Jellyfin Service.bat as admin)"
          files: release/*
          draft: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: JellyfinAudioService-build
          path: release/
